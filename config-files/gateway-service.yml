server:
  port: 8090

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/orders/**
          filters:
            - StripPrefix=0

        - id: product-service-internal
          uri: lb://product-service
          predicates:
            - Path=/internal/products/**
          filters:
            - StripPrefix=0

        - id: product-service-public
          uri: lb://product-service
          predicates:
            - Path=/products/**
          filters:
            - StripPrefix=0

        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/**
          filters:
            - StripPrefix=0

        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/payments/**
          filters:
            - StripPrefix=0

