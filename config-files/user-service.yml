server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hardwarestore?currentSchema=user_service
    username: postgres
    password: orion
    driver-class-name: org.postgresql.Driver

  main:
    debug: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/migration/changelog-master.yaml

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.project.controller: DEBUG
    com.project.repository: DEBUG
    org.springframework: INFO

thymeleaf:
  cache: false
  prefix: classpath:/templates/
  suffix: .html
