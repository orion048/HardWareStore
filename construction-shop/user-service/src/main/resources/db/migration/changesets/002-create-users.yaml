databaseChangeLog:
  - changeSet:
      id: create-users-table
      author: armen
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: true

              - column:
                  name: first_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: true

              - column:
                  name: last_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: true

              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
